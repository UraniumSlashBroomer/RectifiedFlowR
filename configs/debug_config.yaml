model:
  img_size: 32
  in_channels: 3
  patch_size: 8
  emb_dim: 64
  ffn_dim_ratio: 4
  n_heads: 2
  num_layers: 2
  positional_encoding: 'sincos'
  p_pos_encoding_dropout: 0.0
  p_encoder_dropout: 0.0

train:
  data:
    num_training: 10
    num_validation: 10
    batch_size: 2
    drop_last: true
  optimizer:
    lr: 0.0003
    weight_decay: 0.00001
  scheduler:
    type: 'CosineAnnealingLR'
    eta_min: 1.0e-06
    warmup:
      type: 'linear'
      start_factor: 0.05
      epochs: 1
  process:
    epochs: 2

checkpoint:
  img_save_every_n_epochs: 1
  img_B: 2
  img_T: 10
  model_save_every_n_epochs: 1
  saveroot: results/debug/
